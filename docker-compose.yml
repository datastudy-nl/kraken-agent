services:
  kraken-sandbox:
    build:
      context: ./server
      dockerfile: sandbox.Dockerfile
    image: kraken-sandbox:latest
    profiles:
      - build-only

  kraken-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${KRAKEN_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kraken:${POSTGRES_PASSWORD:-kraken}@postgres:5432/kraken
      - REDIS_URL=redis://redis:6379
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-kraken}
      - KRAKEN_BROWSER_CDP_URL=ws://chromium:3000
      - KRAKEN_SECRET_KEY=${KRAKEN_SECRET_KEY}
    env_file:
      - .env
    volumes:
      - kraken-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - kraken-workspaces:/app/workspaces
    networks:
      - default
      - sandbox-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromium:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kraken:${POSTGRES_PASSWORD:-kraken}@postgres:5432/kraken
      - REDIS_URL=redis://redis:6379
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-kraken}
      - KRAKEN_BROWSER_CDP_URL=ws://chromium:3000
      - KRAKEN_SECRET_KEY=${KRAKEN_SECRET_KEY}
    env_file:
      - .env
    volumes:
      - kraken-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - kraken-workspaces:/app/workspaces
    networks:
      - default
      - sandbox-net
    depends_on:
      - kraken-api
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_USER=kraken
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kraken}
      - POSTGRES_DB=kraken
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kraken"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-kraken}
      - NEO4J_server_bolt_enabled=true
      - NEO4J_server_http_enabled=true
      - NEO4J_server_https_enabled=false
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  chromium:
    image: ghcr.io/browserless/chromium
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
    restart: unless-stopped

volumes:
  kraken-data:
  kraken-workspaces:
  postgres-data:
  redis-data:
  neo4j-data:

networks:
  sandbox-net:
    name: kraken-sandbox-net
    driver: bridge
